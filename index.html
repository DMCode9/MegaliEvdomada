<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μεγάλη Εβδομάδα - Πλήρης Εφαρμογή</title>
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf6; 
            --txt: #2c3e50; 
            --acc: #b22222;
            --sheet-bg: #2c3e50; /* Σκούρο φόντο στο light mode για αντίθεση */
            --sheet-txt: #ffffff; 
            --switch-bg: #ffd700;
        }

        [data-theme="dark"] {
            --bg: #121212; 
            --txt: #e0e0e0; 
            --acc: #ff6b6b;
            --sheet-bg: #000000; /* Μαύρο φόντο στο dark mode */
            --sheet-txt: #ffffff; 
            --switch-bg: #555;
        }

        body {
            font-family: 'GFS Didot', serif; 
            background: var(--bg); 
            color: var(--txt);
            line-height: 1.8; 
            margin: 0; 
            padding-bottom: 250px; 
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container { max-width: 700px; margin: 0 auto; padding: 20px; }

        /* Navigation Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--bg);
            padding: 15px 0; z-index: 1000; border-bottom: 2px solid var(--acc);
        }

        .controls { display: flex; gap: 15px; align-items: center; }

        .nav-btn {
            border: 2px solid var(--acc);
            background: none;
            color: var(--acc);
            border-radius: 999px;
            padding: 8px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .nav-btn[hidden] { display: none; }

        /* Voice Button */
        #voice-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--acc);
            background: none; color: var(--acc); cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }
        #voice-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Voice Overlay */
        #voice-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: white; padding: 30px;
            border-radius: 20px; text-align: center; z-index: 2000;
            display: none; width: 250px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Theme Switch */
        .theme-switch {
            position: relative; width: 60px; height: 30px; background: var(--switch-bg);
            border-radius: 15px; cursor: pointer; display: flex; align-items: center;
        }
        .handle {
            width: 22px; height: 22px; background: white; border-radius: 50%;
            position: absolute; left: 4px; transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
        }
        [data-theme="dark"] .handle { transform: translateX(30px); }

        /* Content */
        h1 { font-size: 1.4rem; margin: 0; color: var(--acc); }
        h3 { color: var(--acc); border-bottom: 1px solid; margin-top: 40px; }
        .rubric { color: var(--acc); font-style: italic; text-align: center; margin: 30px 0; font-size: 0.9rem; }
        .section-content p { margin: 0 0 16px; }
        .section-content p:last-child { margin-bottom: 0; }
        .glossary-term { color: var(--acc); border-bottom: 1px dashed var(--acc); cursor: pointer; font-weight: bold; }
        .highlight { background: rgba(178, 34, 34, 0.25); border-radius: 5px; transition: 0.5s; }
        .sequence-intro { margin: 30px 0 20px; text-align: center; }
        .sequence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .sequence-card {
            border: 1px solid rgba(178, 34, 34, 0.35);
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(178, 34, 34, 0.08), rgba(255, 215, 0, 0.12));
            padding: 18px;
            text-align: left;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            font-family: inherit;
            color: var(--txt);
        }
        .sequence-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-color: var(--acc);
        }
        .sequence-card strong {
            color: var(--acc);
            display: block;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }
        .sequence-card span {
            display: block;
            font-size: 0.92rem;
            opacity: 0.85;
        }
        .status-message {
            text-align: center;
            margin: 40px 0;
            font-size: 1rem;
        }

        /* Bottom Sheet - Διορθωμένο για ορατότητα */
        #explanation-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0;
            background: var(--sheet-bg); 
            color: var(--sheet-txt) !important; /* Force λευκά γράμματα για αντίθεση */
            padding: 30px; border-radius: 25px 25px 0 0;
            z-index: 1001; transition: 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            max-height: 40vh; overflow-y: auto; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
            border-top: 4px solid var(--acc);
        }
        #explanation-sheet.active { bottom: 0; }
        
        #sheet-content strong { color: var(--acc); display: block; margin-bottom: 10px; font-size: 1.2rem; }
        #sheet-content p { margin: 0; font-size: 1.1rem; line-height: 1.6; color: #ffffff; }

        .close-sheet { 
            float: right; cursor: pointer; font-size: 2rem; line-height: 1;
            color: var(--acc); margin-top: -10px;
        }
    </style>
</head>
<body onclick="closeSheet()">

<div id="voice-overlay">
    <div style="color:#ff6b6b; font-size: 1.5rem; margin-bottom:10px;">●</div>
    <p>Ακούω τον ψάλτη...</p>
    <div id="voice-transcript" style="font-style: italic; color: #aaa; font-size: 0.9rem;"></div>
</div>

<div class="container">
    <div class="top-bar">
        <h1 id="page-title">Μεγάλη Εβδομάδα</h1>
        <div class="controls">
            <button id="back-btn" class="nav-btn" onclick="showSequenceCards(event)" hidden>Ακολουθίες</button>
            <button id="voice-btn" onclick="startVoice(event)" title="Φωνητικός Συγχρονισμός">🎤</button>
            <div class="theme-switch" onclick="toggleTheme(event)">
                <div class="handle"><span id="theme-icon">☀️</span></div>
            </div>
        </div>
    </div>

    <main id="app"></main>
</div>

<div id="explanation-sheet" onclick="event.stopPropagation()">
    <span class="close-sheet" onclick="closeSheet()">×</span>
    <div id="sheet-content"></div>
</div>

<script src="sequences/bundle.js"></script>
<script>
    const SEQUENCE_INDEX_URL = 'sequences/index.json';
    const DEFAULT_TITLE = 'Μεγάλη Εβδομάδα';
    let sequenceList = [];
    let sequenceData = [];
    let currentSequence = null;

    function normalize(text) {
        return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function stripHtml(text) {
        return text.replace(/<[^>]*>/g, ' ');
    }

    function cloneData(data) {
        return JSON.parse(JSON.stringify(data));
    }

    function getBundle() {
        return window.SEQUENCE_BUNDLE || { index: [], texts: {} };
    }

    async function fetchJsonWithFallback(url, fallbackData, label) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            if (fallbackData) {
                console.warn(`Χρήση fallback για ${label}:`, error);
                return cloneData(fallbackData);
            }
            throw error;
        }
    }

    async function fetchTextWithFallback(url, fallbackText, label) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return await response.text();
        } catch (error) {
            if (typeof fallbackText === 'string') {
                console.warn(`Χρήση fallback για ${label}:`, error);
                return fallbackText;
            }
            throw error;
        }
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatInlineComments(text) {
        const pattern = /\[([^\]]+)\]\{([^}]+)\}/g;
        let result = '';
        let lastIndex = 0;
        let match;

        while ((match = pattern.exec(text)) !== null) {
            result += escapeHtml(text.slice(lastIndex, match.index));
            result += `<span class="glossary-term" data-term="${escapeHtml(match[1])}" data-def="${escapeHtml(match[2])}">${escapeHtml(match[1])}</span>`;
            lastIndex = pattern.lastIndex;
        }

        result += escapeHtml(text.slice(lastIndex));
        return result;
    }

    function parseSequenceText(text) {
        const lines = text.replace(/\r\n/g, '\n').split('\n');
        const items = [];
        let currentSection = null;
        let paragraphLines = [];

        function flushParagraph() {
            if (!currentSection || paragraphLines.length === 0) return;
            currentSection.paragraphs.push(paragraphLines.join(' '));
            paragraphLines = [];
        }

        function flushSection() {
            flushParagraph();
            if (!currentSection) return;

            items.push({
                type: 'hymn',
                title: currentSection.title,
                contentHtml: currentSection.paragraphs.map((paragraph) => `<p>${formatInlineComments(paragraph)}</p>`).join(''),
                searchText: currentSection.paragraphs.join(' ')
            });
            currentSection = null;
        }

        lines.forEach((line) => {
            const trimmed = line.trim();

            if (!trimmed) {
                flushParagraph();
                return;
            }

            if (trimmed.startsWith('# ')) {
                return;
            }

            if (trimmed.startsWith('## ')) {
                flushSection();
                currentSection = {
                    title: trimmed.slice(3).trim(),
                    paragraphs: []
                };
                return;
            }

            if (trimmed.startsWith('> ')) {
                flushSection();
                items.push({
                    type: 'rubric',
                    contentHtml: formatInlineComments(trimmed.slice(2).trim()),
                    searchText: trimmed.slice(2).trim()
                });
                return;
            }

            if (!currentSection) {
                currentSection = {
                    title: '',
                    paragraphs: []
                };
            }

            paragraphLines.push(trimmed);
        });

        flushSection();
        return items;
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = sequenceData.map((item, idx) => {
            if (item.type === 'rubric') return `<div class="rubric">${item.contentHtml}</div>`;
            const titleHtml = item.title ? `<h3>${item.title}</h3>` : '';
            return `<section id="sec-${idx}">${titleHtml}<div class="section-content">${item.contentHtml}</div></section>`;
        }).join('');

        document.querySelectorAll('.glossary-term').forEach(el => {
            el.onclick = (e) => { 
                e.stopPropagation(); 
                openSheet(e.target.dataset.term, e.target.dataset.def); 
            };
        });
    }

    function updateTopBar() {
        document.getElementById('page-title').innerText = currentSequence ? currentSequence.title : DEFAULT_TITLE;
        document.getElementById('back-btn').hidden = !currentSequence;
        document.getElementById('voice-btn').disabled = !currentSequence || !rec || sequenceData.length === 0;
    }

    function renderStatus(message) {
        const app = document.getElementById('app');
        app.innerHTML = `<p class="status-message">${message}</p>`;
    }

    function renderSequenceCards() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="sequence-intro">
                <p>Επίλεξε ακολουθία για να φορτωθεί το αντίστοιχο κείμενο από το δικό του JSON αρχείο.</p>
            </div>
            <div class="sequence-grid">
                ${sequenceList.map((item) => `
                    <button class="sequence-card" type="button" data-sequence-id="${item.id}">
                        <strong>${item.title}</strong>
                        <span>Φόρτωση από ${item.file}</span>
                    </button>
                `).join('')}
            </div>
        `;

        document.querySelectorAll('.sequence-card').forEach((card) => {
            card.onclick = (e) => {
                e.stopPropagation();
                const selected = sequenceList.find((item) => item.id === card.dataset.sequenceId);
                if (selected) {
                    loadSequence(selected);
                }
            };
        });
    }

    async function loadSequenceIndex() {
        renderStatus('Φόρτωση ακολουθιών...');

        try {
            sequenceList = await fetchJsonWithFallback(SEQUENCE_INDEX_URL, getBundle().index, 'τη λίστα ακολουθιών');
            currentSequence = null;
            sequenceData = [];
            updateTopBar();
            renderSequenceCards();
        } catch (error) {
            console.error('Αποτυχία φόρτωσης λίστας ακολουθιών:', error);
            renderStatus('Δεν ήταν δυνατή η φόρτωση της λίστας ακολουθιών. Άνοιξέ το μέσω Live Server ή τοπικού server.');
        }
    }

    async function loadSequence(sequenceMeta) {
        currentSequence = sequenceMeta;
        sequenceData = [];
        closeSheet();
        updateTopBar();
        renderStatus(`Φόρτωση: ${sequenceMeta.title}`);

        try {
            const rawText = await fetchTextWithFallback(
                `sequences/${sequenceMeta.file}`,
                getBundle().texts[sequenceMeta.file],
                `την ακολουθία ${sequenceMeta.title}`
            );
            sequenceData = parseSequenceText(rawText);
            updateTopBar();
            render();
        } catch (error) {
            console.error('Αποτυχία φόρτωσης ακολουθίας:', error);
            updateTopBar();
            renderStatus('Δεν ήταν δυνατή η φόρτωση της συγκεκριμένης ακολουθίας. Άνοιξέ το μέσω Live Server ή τοπικού server.');
        }
    }

    function showSequenceCards(e) {
        if (e) e.stopPropagation();
        currentSequence = null;
        sequenceData = [];
        closeSheet();
        updateTopBar();
        renderSequenceCards();
    }

    // Voice Sync Logic
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;
    if (SpeechRec) {
        rec = new SpeechRec();
        rec.lang = 'el-GR';
        rec.interimResults = true;

        rec.onstart = () => { document.getElementById('voice-overlay').style.display = 'block'; };
        rec.onresult = (e) => {
            let text = e.results[0][0].transcript;
            document.getElementById('voice-transcript').innerText = text;
            if (e.results[0].isFinal) {
                setTimeout(() => {
                    document.getElementById('voice-overlay').style.display = 'none';
                    findAndScroll(normalize(text));
                }, 600);
            }
        };
        rec.onerror = () => { document.getElementById('voice-overlay').style.display = 'none'; };
        rec.onend = () => { document.getElementById('voice-overlay').style.display = 'none'; };
    }

    function startVoice(e) {
        e.stopPropagation();
        if (!currentSequence) return alert("Επίλεξε πρώτα μία ακολουθία.");
        if (!rec) return alert("Απαιτείται HTTPS ή Live Server για το μικρόφωνο.");
        rec.start();
    }

    function findAndScroll(query) {
        sequenceData.forEach((item, idx) => {
            if (item.type === 'hymn' && normalize(stripHtml(item.searchText || '')).includes(query)) {
                const el = document.getElementById(`sec-${idx}`);
                if (!el) return;
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight');
                setTimeout(() => el.classList.remove('highlight'), 3000);
            }
        });
    }

    // UI Logic
    function openSheet(term, def) {
        document.getElementById('sheet-content').innerHTML = `<strong>${term}</strong><p>${def}</p>`;
        document.getElementById('explanation-sheet').classList.add('active');
    }
    
    function closeSheet() { document.getElementById('explanation-sheet').classList.remove('active'); }

    function toggleTheme(e) {
        e.stopPropagation();
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme'); icon.innerText = "☀️";
        } else {
            body.setAttribute('data-theme', 'dark'); icon.innerText = "🌙";
        }
    }

    updateTopBar();
    loadSequenceIndex();
</script>
</body>
</html>
