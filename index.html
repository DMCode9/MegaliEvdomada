<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μεγάλη Εβδομάδα - Voice Sync Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf6; --txt: #2c3e50; --acc: #b22222;
            --sheet-bg: #2c3e50; --sheet-txt: #ffffff; --switch-bg: #ffd700;
        }

        [data-theme="dark"] {
            --bg: #121212; --txt: #e0e0e0; --acc: #ff6b6b;
            --sheet-bg: #000000; --sheet-txt: #ffffff; --switch-bg: #555;
        }

        body {
            font-family: 'GFS Didot', serif; background: var(--bg); color: var(--txt);
            line-height: 1.8; margin: 0; padding-bottom: 100px; transition: 0.4s;
        }

        .container { max-width: 700px; margin: 0 auto; padding: 20px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--bg);
            padding: 15px 0; z-index: 1000; border-bottom: 2px solid var(--acc);
        }

        .nav-btn {
            border: 2px solid var(--acc); background: none; color: var(--acc);
            border-radius: 999px; padding: 8px 14px; cursor: pointer; font-family: inherit;
        }

        /* Voice Button Pulse */
        #voice-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--acc);
            background: none; color: var(--acc); cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        #voice-btn.listening { background: var(--acc); color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(178, 34, 34, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(178, 34, 34, 0); }
            100% { box-shadow: 0 0 0 0 rgba(178, 34, 34, 0); }
        }

        /* Voice Overlay & Waves */
        #voice-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: white; padding: 20px 40px;
            border-radius: 50px; text-align: center; z-index: 2000;
            display: none; width: 80%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .wave-container {
            display: flex; justify-content: center; align-items: center; gap: 4px; height: 30px; margin-bottom: 10px;
        }

        .wave-bar {
            width: 4px; height: 10px; background: var(--acc); border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        #voice-transcript { font-size: 1.1rem; min-height: 1.5em; font-weight: bold; }
        #voice-status { font-size: 0.8rem; color: #ff6b6b; margin-top: 5px; text-transform: uppercase; }

        /* Rest of UI */
        h3 { color: var(--acc); border-bottom: 1px solid; margin-top: 40px; }
        .rubric { color: var(--acc); font-style: italic; text-align: center; margin: 30px 0; }
        .highlight { background: rgba(178, 34, 34, 0.3) !important; transition: 1s; border-radius: 8px; }
        
        .sequence-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .sequence-card {
            border: 1px solid var(--acc); padding: 15px; border-radius: 12px;
            background: rgba(178, 34, 34, 0.05); cursor: pointer; text-align: left;
        }

        #explanation-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0;
            background: var(--sheet-bg); color: #fff; padding: 25px;
            border-radius: 20px 20px 0 0; z-index: 1001; transition: 0.4s;
        }
        #explanation-sheet.active { bottom: 0; }
        .close-sheet { float: right; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body onclick="closeSheet()">

<div id="voice-overlay">
    <div class="wave-container">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <div id="voice-transcript">Ακούω...</div>
    <div id="voice-status"></div>
</div>

<div class="container">
    <div class="top-bar">
        <h1 id="page-title">Μεγάλη Εβδομάδα</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <button id="back-btn" class="nav-btn" onclick="showSequenceCards()" hidden>Λίστα</button>
            <button id="voice-btn" onclick="startVoice(event)">🎤</button>
        </div>
    </div>

    <main id="app"></main>
</div>

<div id="explanation-sheet" onclick="event.stopPropagation()">
    <span class="close-sheet" onclick="closeSheet()">×</span>
    <div id="sheet-content"></div>
</div>

<script>
    // Data & State
    let sequenceData = [];
    let currentSequence = null;
    const app = document.getElementById('app');
    
    // Mock Data για την επίδειξη (Εδώ θα φορτώνονται τα JSON σας)
    const mockIndex = [
        { id: "m-triti", title: "Όρθρος Μεγάλης Τρίτης", file: "triti.txt" }
    ];
    const mockText = "## Ιδού ο Νυμφίος\nΙδού ο Νυμφίος έρχεται εν τω μέσω της νυκτός...\n> Ο λαός ψάλλει αργά.\n## Το τροπάριο της Κασσιανής\nΚύριε η εν πολλαίς αμαρτίαις περιπεσούσα γυνή...";

    function normalize(text) {
        return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function parseText(text) {
        return text.split('\n').filter(l => l.trim()).map(line => {
            if (line.startsWith('## ')) return { type: 'hymn', title: line.replace('## ', ''), content: '' };
            if (line.startsWith('> ')) return { type: 'rubric', content: line.replace('> ', '') };
            return { type: 'text', content: line };
        }).reduce((acc, curr) => {
            if (curr.type === 'hymn') acc.push(curr);
            else if (acc.length > 0) acc[acc.length-1].content += ' ' + curr.content;
            return acc;
        }, []);
    }

    function render() {
        app.innerHTML = sequenceData.map((item, idx) => `
            <section id="sec-${idx}" style="padding:10px; margin-bottom:10px;">
                ${item.type === 'hymn' ? `<h3>${item.title}</h3><p>${item.content}</p>` : `<div class="rubric">${item.content}</div>`}
            </section>
        `).join('');
    }

    function showSequenceCards() {
        currentSequence = null;
        document.getElementById('back-btn').hidden = true;
        document.getElementById('page-title').innerText = "Μεγάλη Εβδομάδα";
        app.innerHTML = `<div class="sequence-grid">` + mockIndex.map(s => `
            <div class="sequence-card" onclick="loadSeq()">
                <strong>${s.title}</strong><br><small>Πατήστε για φόρτωση</small>
            </div>
        `).join('') + `</div>`;
    }

    function loadSeq() {
        currentSequence = true;
        document.getElementById('back-btn').hidden = false;
        document.getElementById('page-title').innerText = mockIndex[0].title;
        sequenceData = parseText(mockText);
        render();
    }

    // --- Voice Logic ---
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;

    if (SpeechRec) {
        rec = new SpeechRec();
        rec.lang = 'el-GR';
        rec.interimResults = true;
        rec.continuous = false;

        rec.onstart = () => {
            document.getElementById('voice-overlay').style.display = 'block';
            document.getElementById('voice-btn').classList.add('listening');
            document.getElementById('voice-status').innerText = "Αναμονή για ψαλμωδία...";
        };

        rec.onresult = (e) => {
            let transcript = Array.from(e.results)
                .map(result => result[0].transcript)
                .join('');
            
            document.getElementById('voice-transcript').innerText = transcript;
            
            // Δυναμική αναζήτηση καθώς μιλάει (Interim)
            findAndScroll(transcript, false);
        };

        rec.onend = () => {
            document.getElementById('voice-btn').classList.remove('listening');
            setTimeout(() => {
                document.getElementById('voice-overlay').style.display = 'none';
                document.getElementById('voice-transcript').innerText = "Ακούω...";
            }, 2000);
        };
    }

    function startVoice(e) {
        e.stopPropagation();
        if (!currentSequence) return alert("Επιλέξτε πρώτα Ακολουθία");
        if (!rec) return alert("Το πρόγραμμα περιήγησης δεν υποστηρίζει φωνητική αναγνώριση.");
        rec.start();
    }

    function findAndScroll(query, isFinal) {
        const cleanQuery = normalize(query);
        if (cleanQuery.length < 4) return; // Αποφυγή μικρών λέξεων

        let foundIdx = -1;
        sequenceData.forEach((item, idx) => {
            const source = normalize(item.title + " " + item.content);
            if (source.includes(cleanQuery)) {
                foundIdx = idx;
            }
        });

        if (foundIdx !== -1) {
            const el = document.getElementById(`sec-${foundIdx}`);
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            document.getElementById('voice-status').innerText = "✓ Βρέθηκε ταύτιση στο κείμενο!";
            document.getElementById('voice-status').style.color = "#4caf50";
            
            setTimeout(() => el.classList.remove('highlight'), 3000);
        }
    }

    function closeSheet() { document.getElementById('explanation-sheet').classList.remove('active'); }
    
    // Αρχική εμφάνιση
    showSequenceCards();
</script>
</body>
</html>
