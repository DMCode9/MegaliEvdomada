<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μεγάλη Εβδομάδα - Voice Sync Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf6; --txt: #2c3e50; --acc: #b22222;
            --sheet-bg: #2c3e50; --sheet-txt: #ffffff; --switch-bg: #ffd700;
        }

        [data-theme="dark"] {
            --bg: #121212; --txt: #e0e0e0; --acc: #ff6b6b;
            --sheet-bg: #000000; --sheet-txt: #ffffff; --switch-bg: #555;
        }

        body {
            font-family: 'GFS Didot', serif; background: var(--bg); color: var(--txt);
            line-height: 1.8; margin: 0; padding-bottom: 250px; transition: 0.4s ease;
        }

        .container { max-width: 700px; margin: 0 auto; padding: 20px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--bg);
            padding: 15px 0; z-index: 1000; border-bottom: 2px solid var(--acc);
        }

        .controls { display: flex; gap: 15px; align-items: center; }

        .nav-btn {
            border: 2px solid var(--acc); background: none; color: var(--acc);
            border-radius: 999px; padding: 8px 14px; cursor: pointer; font-family: inherit;
        }

        #voice-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--acc);
            background: none; color: var(--acc); cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        #voice-btn.active-rec { background: var(--acc); color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(178, 34, 34, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(178, 34, 34, 0); }
            100% { box-shadow: 0 0 0 0 rgba(178, 34, 34, 0); }
        }

        /* Voice Overlay */
        #voice-overlay {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.92); color: white; padding: 25px;
            border-radius: 25px; text-align: center; z-index: 2000;
            display: none; width: 85%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .wave-container { display: flex; justify-content: center; align-items: center; gap: 4px; height: 30px; margin-bottom: 15px; }
        .wave-bar { width: 4px; height: 10px; background: var(--acc); border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 30px; } }

        /* Typography & UI */
        h1 { font-size: 1.3rem; margin: 0; color: var(--acc); }
        h3 { color: var(--acc); border-bottom: 1px solid; margin-top: 40px; padding-bottom: 5px; }
        .rubric { color: var(--acc); font-style: italic; text-align: center; margin: 30px 0; font-size: 0.95rem; opacity: 0.9; }
        .highlight { background: rgba(178, 34, 34, 0.25) !important; border-radius: 8px; transition: 0.6s ease; }
        
        .sequence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-top: 25px; }
        .sequence-card {
            border: 1px solid rgba(178, 34, 34, 0.3); border-radius: 15px;
            background: linear-gradient(135deg, rgba(178, 34, 34, 0.05), rgba(255, 215, 0, 0.05));
            padding: 20px; text-align: left; cursor: pointer; transition: 0.3s; color: var(--txt); font-family: inherit;
        }
        .sequence-card:hover { transform: translateY(-3px); border-color: var(--acc); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        #explanation-sheet {
            position: fixed; bottom: -100%; left: 0; right: 0;
            background: var(--sheet-bg); color: #fff; padding: 30px;
            border-radius: 25px 25px 0 0; z-index: 1001; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            max-height: 45vh; overflow-y: auto; border-top: 4px solid var(--acc);
        }
        #explanation-sheet.active { bottom: 0; }
        .close-sheet { float: right; cursor: pointer; font-size: 2rem; color: var(--acc); margin-top: -10px; }

        .theme-switch { width: 50px; height: 26px; background: var(--switch-bg); border-radius: 13px; cursor: pointer; position: relative; }
        .handle { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; left: 3px; top: 3px; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        [data-theme="dark"] .handle { transform: translateX(24px); }
    </style>
</head>
<body onclick="closeSheet()">

<div id="voice-overlay">
    <div class="wave-container">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>
    <div id="voice-transcript" style="min-height: 1.2em; font-style: italic; opacity: 0.9;">Ακούω...</div>
    <div id="voice-match-msg" style="margin-top: 10px; font-weight: bold; font-size: 0.9rem; color: #ffda44;"></div>
</div>

<div class="container">
    <div class="top-bar">
        <h1 id="page-title">Μεγάλη Εβδομάδα</h1>
        <div class="controls">
            <button id="back-btn" class="nav-btn" onclick="showSequenceCards(event)" hidden>Ακολουθίες</button>
            <button id="voice-btn" onclick="startVoice(event)">🎤</button>
            <div class="theme-switch" onclick="toggleTheme(event)">
                <div class="handle"><span id="theme-icon">☀️</span></div>
            </div>
        </div>
    </div>
    <main id="app"></main>
</div>

<div id="explanation-sheet" onclick="event.stopPropagation()">
    <span class="close-sheet" onclick="closeSheet()">×</span>
    <div id="sheet-content"></div>
</div>

<script src="sequences/bundle.js"></script>
<script>
    const SEQUENCE_INDEX_URL = 'sequences/index.json';
    let sequenceList = [];
    let sequenceData = [];
    let currentSequence = null;

    // --- Core Logic ---
    const normalize = (t) => t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    
    function getBundle() { return window.SEQUENCE_BUNDLE || { index: [], texts: {} }; }

    async function init() {
        try {
            const res = await fetch(SEQUENCE_INDEX_URL);
            sequenceList = res.ok ? await res.json() : getBundle().index;
        } catch(e) { sequenceList = getBundle().index; }
        showSequenceCards();
    }

    function showSequenceCards(e) {
        if(e) e.stopPropagation();
        currentSequence = null;
        document.getElementById('page-title').innerText = "Μεγάλη Εβδομάδα";
        document.getElementById('back-btn').hidden = true;
        
        const app = document.getElementById('app');
        app.innerHTML = `<div class="sequence-grid">` + 
            sequenceList.map(s => `
                <div class="sequence-card" onclick="loadSequence('${s.id}')">
                    <strong>${s.title}</strong>
                    <div style="font-size: 0.8rem; opacity: 0.7; margin-top: 8px;">Αρχείο: ${s.file}</div>
                </div>
            `).join('') + `</div>`;
    }

    async function loadSequence(id) {
        const meta = sequenceList.find(s => s.id === id);
        if(!meta) return;
        currentSequence = meta;
        document.getElementById('page-title').innerText = meta.title;
        document.getElementById('back-btn').hidden = false;

        let rawText = "";
        try {
            const res = await fetch(`sequences/${meta.file}`);
            rawText = res.ok ? await res.text() : getBundle().texts[meta.file];
        } catch(e) { rawText = getBundle().texts[meta.file]; }

        sequenceData = parseText(rawText);
        render();
    }

    function parseText(text) {
        const lines = text.split('\n');
        const items = [];
        let currentHymn = null;

        lines.forEach(line => {
            const t = line.trim();
            if(!t || t.startsWith('# ')) return;

            if(t.startsWith('## ')) {
                if(currentHymn) items.push(currentHymn);
                currentHymn = { type: 'hymn', title: t.slice(3), paragraphs: [], searchPool: normalize(t.slice(3)) };
            } else if(t.startsWith('> ')) {
                if(currentHymn) items.push(currentHymn);
                items.push({ type: 'rubric', content: formatGlossary(t.slice(2)) });
                currentHymn = null;
            } else {
                if(!currentHymn) currentHymn = { type: 'hymn', title: '', paragraphs: [], searchPool: '' };
                currentHymn.paragraphs.push(formatGlossary(t));
                currentHymn.searchPool += " " + normalize(t);
            }
        });
        if(currentHymn) items.push(currentHymn);
        return items;
    }

    function formatGlossary(text) {
        return text.replace(/\[([^\]]+)\]\{([^}]+)\}/g, '<span class="glossary-term" data-term="$1" data-def="$2">$1</span>');
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = sequenceData.map((item, idx) => {
            if(item.type === 'rubric') return `<div class="rubric">${item.content}</div>`;
            return `<section id="sec-${idx}">
                ${item.title ? `<h3>${item.title}</h3>` : ''}
                <div class="section-content">${item.paragraphs.map(p => `<p>${p}</p>`).join('')}</div>
            </section>`;
        }).join('');

        document.querySelectorAll('.glossary-term').forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); openSheet(el.dataset.term, el.dataset.def); };
        });
    }

    // --- Voice Sync Engine (Keyword Scoring) ---
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;
    if(SpeechRec) {
        rec = new SpeechRec();
        rec.lang = 'el-GR';
        rec.interimResults = true;
        rec.continuous = true;

        rec.onstart = () => {
            document.getElementById('voice-overlay').style.display = 'block';
            document.getElementById('voice-btn').classList.add('active-rec');
        };

        rec.onresult = (e) => {
            let transcript = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                transcript += e.results[i][0].transcript;
            }
            document.getElementById('voice-transcript').innerText = transcript;
            findMatch(transcript);
        };

        rec.onend = () => {
            document.getElementById('voice-btn').classList.remove('active-rec');
            setTimeout(() => { document.getElementById('voice-overlay').style.display = 'none'; }, 2500);
        };
    }

    function findMatch(transcript) {
        const words = normalize(transcript).split(' ').filter(w => w.length > 3);
        if(words.length < 2) return;

        let bestIdx = -1;
        let topScore = 0;

        sequenceData.forEach((item, idx) => {
            if(item.type !== 'hymn') return;
            let score = 0;
            words.forEach(w => { if(item.searchPool.includes(w)) score++; });
            
            if(score > topScore) { topScore = score; bestIdx = idx; }
        });

        if(bestIdx !== -1 && topScore >= 2) {
            const target = document.getElementById(`sec-${bestIdx}`);
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.classList.add('highlight');
            document.getElementById('voice-match-msg').innerText = "✓ Ταύτιση με το κείμενο";
            setTimeout(() => { target.classList.remove('highlight'); }, 3000);
        }
    }

    function startVoice(e) {
        e.stopPropagation();
        if(!currentSequence) return alert("Επιλέξτε μια ακολουθία πρώτα.");
        if(!rec) return alert("Το πρόγραμμα περιήγησης δεν υποστηρίζει φωνητική αναγνώριση.");
        rec.start();
    }

    // --- UI Helpers ---
    function openSheet(t, d) {
        document.getElementById('sheet-content').innerHTML = `<strong>${t}</strong><p style="margin-top:10px;">${d}</p>`;
        document.getElementById('explanation-sheet').classList.add('active');
    }
    function closeSheet() { document.getElementById('explanation-sheet').classList.remove('active'); }
    function toggleTheme(e) {
        e.stopPropagation();
        const b = document.body;
        const isDark = b.hasAttribute('data-theme');
        if(isDark) { b.removeAttribute('data-theme'); document.getElementById('theme-icon').innerText = "☀️"; }
        else { b.setAttribute('data-theme', 'dark'); document.getElementById('theme-icon').innerText = "🌙"; }
    }

    init();
</script>
</body>
</html>
